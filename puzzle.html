<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hand Draw — Simple</title>

  <!-- MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; color: #fff; }

    #container { position: relative; width: 640px; height: 480px; }
    canvas, video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    /* La webcam se oculta — solo usamos su data */
    #video { opacity: 0; transform: scaleX(-1); }

    #info { margin-top: 12px; font-size: 12px; color: #444; letter-spacing: 2px; }
    #status { position: absolute; top: 12px; left: 12px; font-size: 11px; color: #555; letter-spacing: 2px; }
  </style>
</head>
<body>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <!-- Canvas de trazos (persistente) -->
  <canvas id="draw-canvas" width="640" height="480"></canvas>
  <!-- Canvas de landmarks (se limpia cada frame) -->
  <canvas id="guide-canvas" width="640" height="480"></canvas>
  <div id="status">cargando...</div>
</div>
<div id="info">ESPACIO = limpiar &nbsp;·&nbsp; mueve el índice para dibujar</div>

<script>
const video       = document.getElementById('video');
const drawCanvas  = document.getElementById('draw-canvas');
const guideCanvas = document.getElementById('guide-canvas');
const dctx        = drawCanvas.getContext('2d');
const gctx        = guideCanvas.getContext('2d');
const statusEl    = document.getElementById('status');

const W = 640, H = 480;

let lastX = null, lastY = null;
let hue = 0;

// Fondo negro inicial
dctx.fillStyle = '#000';
dctx.fillRect(0, 0, W, H);

function onResults(results) {
  statusEl.textContent = results.multiHandLandmarks?.length ? 'MANO DETECTADA' : 'buscando mano...';

  // Limpiar canvas guía cada frame
  gctx.clearRect(0, 0, W, H);

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    lastX = null; lastY = null;
    return;
  }

  const hand = results.multiHandLandmarks[0];

  // Punto 8 = punta del índice
  // MediaPipe da coordenadas 0-1, hay que invertir X por el espejo
  const tip = hand[8];
  const x = (1 - tip.x) * W;
  const y = tip.y * H;

  // Dibujar trazo en el canvas persistente
  hue = (hue + 1) % 360;
  dctx.beginPath();
  dctx.strokeStyle = `hsl(${hue}, 100%, 60%)`;
  dctx.lineWidth = 3;
  dctx.lineCap = 'round';
  dctx.lineJoin = 'round';

  if (lastX !== null) {
    dctx.moveTo(lastX, lastY);
    dctx.lineTo(x, y);
    dctx.stroke();
  }

  lastX = x; lastY = y;

  // Mostrar punto guía (cursor)
  gctx.beginPath();
  gctx.arc(x, y, 8, 0, Math.PI * 2);
  gctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
  gctx.fill();

  // Mostrar esqueleto de la mano (opcional)
  drawConnectors(gctx, hand, HAND_CONNECTIONS, { color: 'rgba(255,255,255,0.15)', lineWidth: 1 });
}

// Configurar MediaPipe Hands
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.5
});
hands.onResults(onResults);

// Iniciar cámara
const camera = new Camera(video, {
  onFrame: async () => { await hands.send({ image: video }); },
  width: W, height: H
});
camera.start().then(() => statusEl.textContent = 'buscando mano...');

// Limpiar con ESPACIO
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    dctx.fillStyle = '#000';
    dctx.fillRect(0, 0, W, H);
    lastX = null; lastY = null;
  }
});
</script>
</body>
</html>
